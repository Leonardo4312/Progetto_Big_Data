services:
  # ─── HADOOP NAMENODE ───────────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870" # HDFS Web UI
      - "9000:9000" # HDFS RPC
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data # monta la cartella locale ./data dentro il container
      - ./jobs:/jobs # codice MapReduce e Spark
    environment:
      - CLUSTER_NAME=bigdata-cluster
    env_file:
      - ./hadoop.env
    networks:
      - bigdata

  # ─── HADOOP DATANODE ───────────────────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    ports:
      - "9864:9864" # DataNode Web UI
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop.env
    networks:
      - bigdata

  # ─── HIVE METASTORE (PostgreSQL backend) ───────────────────────────────────
  hive-metastore-db:
    image: postgres:13
    container_name: hive-metastore-db
    restart: always
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    networks:
      - bigdata

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9870 datanode:9864 hive-metastore-db:5432"
      DB_DRIVER: postgres
    env_file:
      - ./hadoop.env
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "9083:9083" # Metastore Thrift
    networks:
      - bigdata

  hiveserver2:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hiveserver2
    restart: always
    environment:
      SERVICE_PRECONDITION: "hive-metastore:9083"
    env_file:
      - ./hadoop.env
    ports:
      - "10000:10000" # HiveServer2 JDBC
      - "10002:10002" # HiveServer2 Web UI
    networks:
      - bigdata

  # ─── SPARK MASTER ──────────────────────────────────────────────────────────
  spark-master:
    image: bde2020/spark-master:3.1.1-hadoop3.2
    container_name: spark-master
    restart: always
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080" # Spark Master Web UI
      - "7077:7077" # Spark Master RPC
    volumes:
      - ./jobs:/jobs # codice PySpark
      - ./data:/data # dataset CSV
    networks:
      - bigdata

  spark-worker-1:
    image: bde2020/spark-worker:3.1.1-hadoop3.2
    container_name: spark-worker-1
    restart: always
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8081:8081"
    volumes:
      - ./jobs:/jobs
      - ./data:/data
    networks:
      - bigdata

  spark-worker-2:
    image: bde2020/spark-worker:3.1.1-hadoop3.2
    container_name: spark-worker-2
    restart: always
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8082:8082"
    volumes:
      - ./jobs:/jobs
      - ./data:/data
    networks:
      - bigdata

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hive_metastore_db:

networks:
  bigdata:
    driver: bridge
